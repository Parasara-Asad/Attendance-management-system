<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attendance Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="text-end">Created by parasara Asad</div>
    <p class="h2 text-center">Welcome Attendance Management System</p>
    <div
      class="container-fluid border border-2 border border-dark rounded-3 mt-5 p-3 w-50 text-center"
    >
      <div class="row gx-5">
        <div class="col">
          <div class="p-3">
            <div class="mb-3">
              <label for="userAge" class="form-label"
                >Enter start Attendance</label
              >
              <input type="number" class="form-control" id="start" />
            </div>
          </div>
        </div>
        <div class="col">
          <div class="p-3">
            <div class="mb-3">
              <label for="userAge" class="form-label"
                >Enter End Attendance</label
              >
              <input type="number" class="form-control" id="end" />
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-around mt-3">
        <button
          type="button"
          class="btn btn-primary"
          onclick="GenerateNumber()"
        >
          Generate Attendance
        </button>
      </div>
    </div>
    <div
      class="container-fluid border border-2 border-dark rounded-circle mt-5 text-center"
      id="box"
    >
      <span></span>
    </div>
    <div class="container-fluid w-50" id="btn">
      <div class="d-flex justify-content-evenly mt-5">
        <button type="button" class="btn btn-primary" onclick="previous()">
          Previous
        </button>
        <button type="button" class="btn btn-danger" onclick="absent()">
          Absent
        </button>
        <button type="button" class="btn btn-success" onclick="present()">
          Present
        </button>
        <button
          type="button"
          class="btn btn-primary"
          id="next"
          onclick="next()"
        >
          Next
        </button>
      </div>
    </div>
    <div class="container-fluid w-100 mt-5">
      <div class="d-flex justify-content-center mt-5">
        <button type="button" class="btn btn-success me-5" id="presentcount">
          Present student:
        </button>
        <button type="button" class="btn btn-danger" id="absentcount">
          absent student:
        </button>
      </div>
    </div>
    <div class="container mt-5 text-center w-50">
      <div class="row">
        <div class="col-6 mb-5">
          <h4 class="text-success text-center h4">Present List</h4>
          <div
            id="presentlist"
            class="border border-2 border-success rounded p-3"
            style="min-height: 150px"
          ></div>
        </div>
        <div class="col-6 mb-5">
          <h4 class="text-danger text-center h4">Absent List</h4>
          <div
            id="absentlist"
            class="border border-2 border-danger rounded p-3"
            style="min-height: 150px"
          ></div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
